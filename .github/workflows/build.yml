name: KGZ Mobile True Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива проекта
      run: |
        unzip -o project.zip

    - name: 3. Настройка среды Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Настройка Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0

    - name: 5. Сборка LAUNCHER
      run: |
        if [ -d "launcher" ]; then
          cd launcher
          # Генерируем родной wrapper для Kotlin DSL проекта
          gradle wrapper --gradle-version 7.5 --distribution-type all
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
          cd ..
        else
          echo "Папка launcher не найдена!"
          exit 1
        fi

    - name: 6. Выгрузка готового APK Лаунчера
      uses: actions/upload-artifact@v4
      with:
        name: kgz-launcher-apk
        path: launcher/app/build/outputs/apk/debug/*.apk
