name: KGZ Mobile Project Diagnostics

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива
      run: |
        unzip -o project.zip
        echo "=== СТРУКТУРА ВСЕХ ФАЙЛОВ ==="
        find . -maxdepth 4 -not -path '*/.*'
        
    - name: 3. Поиск конфигураций сборки
      run: |
        echo "=== ИЩЕМ НАСТРОЙКИ СБОРКИ ==="
        find . -name "build.gradle" -o -name "settings.gradle" -o -name "gradlew"
