name: KGZ Mobile Auto-Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива проекта
      run: |
        unzip -o project.zip
        echo "=== Проверка папки android ==="
        ls -la android || echo "Папка android не найдена в корне!"

    - name: 3. Настройка среды Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Настройка Android SDK, NDK и CMake
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk: 25.1.8937393
        cmake: 3.22.1

    - name: 5. Генерация сборщика и компиляция
      run: |
        # Ищем, где лежит папка android с файлом build.gradle
        TARGET_DIR=$(find . -name "build.gradle" -not -path "*/app/*" -exec dirname {} \; | head -n 1)
        
        if [ -z "$TARGET_DIR" ]; then
          if [ -d "android" ]; then TARGET_DIR="android"; else TARGET_DIR="."; fi
        fi
        
        echo "Рабочая директория сборки: $TARGET_DIR"
        cd "$TARGET_DIR"
        
        # Если gradlew нет, принудительно создаем его через установленный gradle системы
        if [ ! -f "gradlew" ]; then
          echo "Файл gradlew не найден. Генерируем новый Gradle wrapper..."
          gradle wrapper --gradle-version 8.0
        fi
        
        chmod +x gradlew
        ./gradlew assembleDebug

    - name: 6. Выгрузка готового APK
      uses: actions/upload-artifact@v4
      with:
        name: kgz-mobile-launcher-debug
        path: |
          **/build/outputs/apk/debug/*.apk
