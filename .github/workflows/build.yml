name: KGZ Mobile Auto-Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива проекта
      run: |
        unzip -o project.zip
        echo "=== Полный список папок проекта ==="
        find . -maxdepth 3 -not -path '*/.*'

    - name: 3. Настройка среды Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Настройка Android SDK, NDK и CMake
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk: 25.1.8937393
        cmake: 3.22.1

    - name: 5. Умная компиляция проекта
      run: |
        # Генерируем Gradle в корне на всякий случай
        gradle wrapper --gradle-version 8.0
        chmod +x gradlew
        
        # Пробуем собрать через главный корень
        if ./gradlew assembleDebug --dry-run >/dev/null 2>&1; then
          echo "Запуск сборки из корня..."
          ./gradlew assembleDebug
        else
          # Если в корне не вышло, ищем все папки, где есть файлы настроек Gradle
          echo "Поиск подходящей папки для сборки..."
          SUCCESS=0
          
          while read -r gradle_file; do
            DIR=$(dirname "$gradle_file")
            echo "Пробуем собрать в папке: $DIR"
            
            cd "$DIR"
            if [ ! -f "gradlew" ]; then
              gradle wrapper --gradle-version 8.0
            fi
            chmod +x gradlew
            
            if ./gradlew assembleDebug; then
              echo "Ура! Сборка успешно завершена в папке $DIR"
              SUCCESS=1
              break
            fi
            cd - > /dev/null
          done < <(find . -name "build.gradle" -not -path "*/build/*")
          
          if [ $SUCCESS -ne 1 ]; then
            echo "Ошибка: Ни одна папка не смогла скомпилировать APK."
            exit 1
          fi
        fi

    - name: 6. Выгрузка готового APK
      uses: actions/upload-artifact@v4
      with:
        name: kgz-mobile-launcher-debug
        path: |
          **/build/outputs/apk/debug/*.apk
          **/build/outputs/apk/release/*.apk
