name: KGZ Mobile Safe Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива проекта
      run: |
        unzip -o project.zip

    - name: 3. Настройка среды Java (JDK 17)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: 4. Настройка Android SDK, NDK и CMake
      uses: android-actions/setup-android@v3
      with:
        api-level: 34
        build-tools: 34.0.0
        ndk: 25.1.8937393
        cmake: 3.22.1

    - name: 5. Сборка LAUNCHER
      run: |
        if [ -d "launcher" ]; then
          cd launcher
          # Берем стабильный дистрибутив gradle из системы, не ломая локальные файлы
          gradle assembleDebug --no-daemon || echo "Лаунчер не собрался, проверяем клиент..."
          cd ..
        fi

    - name: 6. Сборка CLIENT (Android)
      run: |
        if [ -d "android" ]; then
          cd android
          gradle assembleDebug --no-daemon || echo "Клиент не собрался."
          cd ..
        fi

    - name: 7. Выгрузка результатов
      uses: actions/upload-artifact@v4
      with:
        name: kgz-mobile-apks
        path: |
          **/build/outputs/apk/**/*.apk
