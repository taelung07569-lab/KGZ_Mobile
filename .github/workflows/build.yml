name: KGZ Mobile Java 11 Build

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Клонирование репозитория
      uses: actions/checkout@v4

    - name: 2. Распаковка архива
      run: unzip -o project.zip

    - name: 3. Настройка Java 11 (Оружие для старых CRMP)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    - name: 4. Настройка Android SDK
      uses: android-actions/setup-android@v3

    - name: 5. Установка Gradle 7.4.2
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '7.4.2'

    - name: 6. Чтение настроек проекта (Диагностика)
      run: |
        echo "=== LAUNCHER SETTINGS ==="
        cat launcher/settings.gradle.kts || true
        echo "=== LAUNCHER BUILD ==="
        cat launcher/build.gradle.kts || true

    - name: 7. Сборка Лаунчера (Полный лог)
      run: |
        cd launcher
        gradle assembleDebug --stacktrace

    - name: 8. Сборка Клиента (Полный лог)
      run: |
        cd android
        gradle assembleDebug --stacktrace || echo "Клиент пропускаем"

    - name: 9. Сохранение APK
      uses: actions/upload-artifact@v4
      with:
        name: kgz-mobile-apks
        path: '**/*.apk'
